<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DataAI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
overflow:hidden;
background:linear-gradient(120deg,#021024,#0a3d62,#1e90ff);
color:white;
text-align:center;
cursor:pointer;
}

/* fade transition */

body.fade-out{
opacity:0;
transition:opacity 0.8s ease;
}

/* particle canvas */

#particle-canvas{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
}

/* stars */

.stars span{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:0.8;
animation:starMove linear infinite;
}

@keyframes starMove{
0%{transform:translateY(0)}
100%{transform:translateY(-1200px)}
}

/* clouds */

.cloud{
position:absolute;
background:white;
opacity:0.08;
filter:blur(50px);
border-radius:50%;
animation:cloudMove linear infinite;
}

.cloud1{
width:500px;
height:250px;
top:15%;
left:-200px;
animation-duration:50s;
}

.cloud2{
width:450px;
height:200px;
bottom:10%;
left:-300px;
animation-duration:65s;
}

@keyframes cloudMove{
0%{transform:translateX(0)}
100%{transform:translateX(1800px)}
}

/* logo */

.logo-container{
position:relative;
width:140px;
height:140px;
margin-bottom:30px;
}

.logo-ring{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
border:3px solid rgba(255,255,255,0.25);
animation:rotate 8s linear infinite;
}

@keyframes rotate{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.logo{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:95px;
height:95px;
border-radius:50%;
background:linear-gradient(135deg,#74b9ff,#0984e3);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
box-shadow:0 0 30px #74b9ff;
animation:logoPulse 3s ease-in-out infinite;
}

/* logo pulse */

@keyframes logoPulse{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.08)}
100%{transform:translate(-50%,-50%) scale(1)}
}

/* analyzing animation */

.logo.analyze{
animation:scan 1.2s ease-in-out;
}

@keyframes scan{
0%{transform:translate(-50%,-50%) scale(1);}
25%{transform:translate(-50%,-50%) scale(1.2);}
50%{transform:translate(-50%,-50%) scale(0.9);}
75%{transform:translate(-50%,-50%) scale(1.15);}
100%{transform:translate(-50%,-50%) scale(1);}
}

/* title */

.title{
position:relative;
font-size:38px;
font-weight:600;
background:rgba(255,255,255,0.15);
padding:18px 40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
overflow:hidden;
}

/* scanning light */

.title::after{
content:'';
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);
animation:scanLine 4s infinite;
}

@keyframes scanLine{
0%{left:-100%;}
100%{left:120%;}
}

.subtitle{
margin-top:12px;
font-size:20px;
opacity:0.85;
}

</style>
</head>

<body>

<canvas id="particle-canvas"></canvas>

<div class="stars">
<span style="left:10%;animation-duration:8s"></span>
<span style="left:20%;animation-duration:10s"></span>
<span style="left:30%;animation-duration:12s"></span>
<span style="left:40%;animation-duration:9s"></span>
<span style="left:50%;animation-duration:11s"></span>
<span style="left:60%;animation-duration:13s"></span>
<span style="left:70%;animation-duration:7s"></span>
<span style="left:80%;animation-duration:14s"></span>
<span style="left:90%;animation-duration:9s"></span>
</div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="logo-container">
<div class="logo-ring"></div>
<div class="logo">DA</div>
</div>

<div class="title">
Integrated Data Analytics and Prediction Framework
</div>

<div class="subtitle">
(DataAI)
</div>

<script>

/* PARTICLE EFFECT */

const canvas = document.getElementById("particle-canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let mouse = {x:null,y:null};

window.addEventListener("mousemove",function(e){
mouse.x=e.x;
mouse.y=e.y;
});

class Particle{
constructor(x,y,dx,dy,size){
this.x=x;
this.y=y;
this.dx=dx;
this.dy=dy;
this.size=size;
}

draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,0.8)";
ctx.fill();
}

update(){
this.x+=this.dx;
this.y+=this.dy;

if(this.x>canvas.width||this.x<0)this.dx*=-1;
if(this.y>canvas.height||this.y<0)this.dy*=-1;

let dx=mouse.x-this.x;
let dy=mouse.y-this.y;
let distance=Math.sqrt(dx*dx+dy*dy);

if(distance<120){
this.x-=dx/15;
this.y-=dy/15;
}

this.draw();
}
}

function init(){
particles=[];
for(let i=0;i<80;i++){
let size=Math.random()*2+1;
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;
let dx=(Math.random()-0.5)*0.7;
let dy=(Math.random()-0.5)*0.7;

particles.push(new Particle(x,y,dx,dy,size));
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<particles.length;i++){
particles[i].update();
}

requestAnimationFrame(animate);
}

init();
animate();

/* CLICK ANYWHERE TO OPEN LOGIN */

document.addEventListener("click",function(){

let logo = document.querySelector(".logo");

/* analyzing animation */

logo.classList.add("analyze");

/* fade screen */

document.body.classList.add("fade-out");

setTimeout(function(){
window.location.href="index.html";
},1200);

});

</script>

</body>
</html>
